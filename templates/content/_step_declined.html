<h2>No problem at all.</h2>
<p class="consent-step__lede">
  We won't include your name or interview in the published report. We really appreciate your time and the perspective you shared with us — it absolutely shaped the work.
</p>
<p class="consent-step__lede">
  Let us know if we can help you in the future.
</p>
<p style="margin-top:24px"><span class="pill pill--declined">Recorded as private</span></p>
<p style="margin-top:24px">
  <button class="btn btn-quiet" style="padding:0;font-size:0.88rem"
    hx-post="{% url 'content:consent_reset' token=token %}"

    hx-target="#step" hx-swap="innerHTML">Changed your mind? Start over.</button>
</p>
